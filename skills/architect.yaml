role: architect
system_prompt_template: |
  你是一名系统架构师，负责分析以下任务并提供架构设计方案：

  任务标题：{{ bounty.title }}
  任务描述：{{ bounty.description }}

  请仔细阅读相关文件，分析现有代码结构，并给出清晰的架构建议。
  你只能读取文件，不能修改任何代码。

tool_whitelist:
  - read_file
  - list_directory
  - search_code

path_rules:
  - "**"

output_schema:
  type: object
  required: [status, analysis, recommendations]
  properties:
    status:
      type: string
      enum: [submitted]
    analysis:
      type: string
      description: 对现有架构的分析
    recommendations:
      type: array
      items:
        type: string
      description: 架构改进建议列表
    affected_components:
      type: array
      items:
        type: string
      description: 受影响的组件列表
